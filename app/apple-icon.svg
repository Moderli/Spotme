<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Linear gradient matching the brand's primary buttons and logo components -->
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D67D5C"/>
      <stop offset="100%" stop-color="#C46A4A"/>
    </linearGradient>
  </defs>

  <!-- 32x32 rounded icon container with corner radius matching rounded-2xl style -->
  <rect width="32" height="32" rx="9" fill="url(#brand-grad)" />

  <!-- Clean camera motif centered in the container -->
  <g transform="translate(6, 7)" fill="none" stroke="#ffffff" stroke-width="1.75" stroke-linejoin="round" stroke-linecap="round">
    <!-- Camera Body with pentaprism/notch -->
    <path d="M2.5 6.5h3.5l1.25-2.25h5.5l1.25 2.25h3.5c0.8 0 1.5 0.7 1.5 1.5v8.5c0 0.8-0.7 1.5-1.5 1.5H2.5C1.7 16 1 15.3 1 14.5v-8.5C1 7.2 1.7 6.5 2.5 6.5z" />
    
    <!-- Camera Lens ring -->
    <circle cx="10" cy="11.25" r="3.25" />
    
    <!-- Flash/Sensor dot in top-right -->
    <circle cx="15.5" cy="8.5" r="0.5" fill="#ffffff" stroke="none" />
  </g>
</svg>
